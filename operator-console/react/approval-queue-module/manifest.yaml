apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: approval-queue-module
  displayName: Approval Queue Operator UI
  description: "Operator console module for human-in-the-loop approval queues. Overlays\
    \ react-app-shell with queue list, item detail, and approve/reject/clear actions\
    \ posting to POST /callbacks/approval. Plan \xA711 P2 deliverable.\n"
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: ui
  techStacks:
  - React
  - TypeScript
  patternKind: operator-console
  files:
  - path: ui/src/pages/ApprovalQueue.tsx
    template: ApprovalQueue.tsx.tmpl
    description: Paginated queue list with 10s polling and status filter
  - path: ui/src/pages/ApprovalDetail.tsx
    template: ApprovalDetail.tsx.tmpl
    description: Item detail with confidence/quality scores and action panel
  - path: ui/src/api/approvalClient.ts
    template: approvalClient.ts.tmpl
    description: Typed POST /callbacks/approval gateway client
  - path: ui/src/config/approvalGate.ts
    template: approvalGate.ts.tmpl
    description: 'HumanApprovalGateSpec constants: thresholds, roles, escalation'
  - path: ui/src/pages/router.approval.patch.tsx
    template: router.patch.tsx.tmpl
    description: Route additions to append at APPDARTA-EXTEND anchor in router.tsx
  - path: ui/src/components/Layout.approval.patch.tsx
    template: Layout.patch.tsx.tmpl
    description: Nav link addition to append at APPDARTA-EXTEND anchor in Layout.tsx
  promptHints:
    skeleton: 'Overlay on react-app-shell. ApprovalQueue polls GET /gateway/api/approval/pending.
      ApprovalDetail posts to POST /callbacks/approval with decision + audit fields.
      approvalGate.ts holds HumanApprovalGateSpec constants generated from wizard
      answers.

      '
    implementation: "Merge router.approval.patch.tsx into router.tsx at the APPDARTA-EXTEND\
      \ anchor. Merge Layout.approval.patch.tsx nav link into Layout.tsx at the APPDARTA-EXTEND\
      \ anchor. Never call /approve \u2014 always /callbacks/approval.\n"
    screens: 'Two screens: /approval (queue list) and /approval/:invocationId (detail).
      Action panel is inline in detail; reason field required for reject/clear (min
      10 chars).

      '
  intelligence:
    maturityLevel: stable
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 8
    compositesWith:
    - react-app-shell
    tags:
    - approval
    - hitl
    - operator
    - queue
    - ui-module
  wizardPrompts:
    stage: design
    file: wizard-prompts.yaml
  integrationClasses: []
templatesApiVersion: '1'
