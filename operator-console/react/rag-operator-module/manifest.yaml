apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: rag-operator-module
  displayName: RAG Operator UI
  description: 'Operator console for grounded RAG queries against /context/rag/synthesize.
    Shows answer, citations, and provenance inline. P3.3 deliverable.

    '
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: ui
  techStacks:
  - React
  - TypeScript
  patternKind: operator-console
  files:
  - path: ui/src/pages/RAGQuery.tsx
    template: RAGQuery.tsx.tmpl
  - path: ui/src/api/ragClient.ts
    template: ragClient.ts.tmpl
  - path: ui/src/pages/router.rag.patch.tsx
    template: router.patch.tsx.tmpl
  - path: ui/src/components/Layout.rag.patch.tsx
    template: Layout.patch.tsx.tmpl
  promptHints:
    skeleton: Query panel posts to context-service /context/rag/synthesize; render
      citations.
    implementation: Merge router/Layout patches at APPDARTA-EXTEND anchors.
  intelligence:
    maturityLevel: stable
    complexityFloor: 2
    complexityIdeal: 4
    complexityCeiling: 8
    compositesWith:
    - react-app-shell
    tags:
    - rag
    - operator
    - synthesis
    - ui-module
templatesApiVersion: '1'
