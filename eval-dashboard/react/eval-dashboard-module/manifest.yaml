apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: eval-dashboard-module
  displayName: Eval quality dashboard
  description: "Operator UI for EvalSpec runs \u2014 criterion scores, weighted pass/fail,\
    \ trend chart. P8.2 deliverable.\n"
  version: 1.0.0
spec:
  nodeKind: ui
  techStacks:
  - React
  - TypeScript
  patternKind: eval-dashboard
  files:
  - path: ui/src/pages/EvalDashboard.tsx
    template: EvalDashboard.tsx.tmpl
  - path: ui/src/api/evalClient.ts
    template: evalClient.ts.tmpl
  - path: ui/src/pages/router.eval.patch.tsx
    template: router.patch.tsx.tmpl
  intelligence:
    maturityLevel: stable
    tags:
    - eval
    - governance
    - dashboard
templatesApiVersion: '1'
