apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: react-app-shell
  displayName: React App Shell
  description: Vite + React SPA with routing, typed gateway API client, and layout
    scaffold.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: ui
  techStacks:
  - React
  - TypeScript
  - Vite
  patternKind: spa
  dhilTaskType: implementation/simple
  dhilComplexity: l1
  files:
  - path: ui/package.json
    template: package.json.tmpl
    description: "npm manifest \u2014 vite, react, react-router-dom, axios"
  - path: ui/vite.config.ts
    template: vite.config.ts.tmpl
    description: Vite config with gateway proxy
  - path: ui/tsconfig.json
    template: tsconfig.json.tmpl
    description: TypeScript config
  - path: ui/src/App.tsx
    template: App.tsx.tmpl
    description: Root component with RouterProvider
  - path: ui/src/router.tsx
    template: router.tsx.tmpl
    description: createBrowserRouter with placeholder Dashboard route
  - path: ui/src/api/client.ts
    template: client.ts.tmpl
    description: Axios instance wired to gateway, with auth header injection
  - path: ui/src/components/Layout.tsx
    template: Layout.tsx.tmpl
    description: 'App shell: nav, main content area, footer'
  promptHints:
    skeleton: React SPA with typed API client calling the gateway. All screens under
      src/pages/.
    implementation: Add pages under src/pages/, register routes in router.tsx, call
      gateway via src/api/client.ts.
    screens: Scaffold each screen as a named component in src/pages/. Use React Router
      loader for data fetching.
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 3
    complexityCeiling: 10
    compositesWith:
    - approval-queue-module
    tags:
    - react
    - spa
    - vite
    - typescript
    - frontend
  contextMapping:
    appliesWhen:
      requirements:
      - React
      - SPA
      - TypeScript
      scale:
        delivery: client-rendered app shell
    doesNotApplyWhen:
    - Next.js
    - SSR
    - Vue
  triggerIncidents:
    exactMatches:
    - TypeScript::spa[*] + Framework[React]
    - React::spa[*]
    semanticTriggers:
      keywords:
        required:
        - react
        - spa
        optional:
        - typescript
        - vite
        - frontend
        - router
      antiKeywords:
      - next.js
      - ssr
      - vue
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
templatesApiVersion: '1'
