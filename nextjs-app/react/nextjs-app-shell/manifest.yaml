apiVersion: appdarta.io/v1
kind: CodeTemplate
metadata:
  name: nextjs-app-shell
  displayName: Next.js App Shell
  description: Next.js 14 App Router shell with typed gateway client, layout, and
    env-based proxy config.
  version: 1.0.0
  author: AppDarta Platform
spec:
  nodeKind: ui
  techStacks:
  - React
  - TypeScript
  - Next.js
  patternKind: nextjs-app
  dhilTaskType: implementation/simple
  dhilComplexity: l1
  intelligence:
    maturityLevel: beta
    complexityFloor: 1
    complexityIdeal: 2
    complexityCeiling: 3
    compositesWith: []
    tags:
    - nextjs
    - react
    - typescript
    - ssr
    - app-router
    - frontend
  contextMapping:
    appliesWhen:
      requirements:
      - Next.js
      - React
      - App Router
      scale:
        delivery: ssr-or-hybrid app shell
    doesNotApplyWhen:
    - Vite
    - Vue
    - pure spa
  triggerIncidents:
    exactMatches:
    - TypeScript::nextjs-app[*] + Framework[Next.js]
    - React::nextjs-app[*] + Framework[Next.js]
    semanticTriggers:
      keywords:
        required:
        - next.js
        - react
        optional:
        - typescript
        - app-router
        - frontend
        - ssr
      antiKeywords:
      - vite
      - vue
      - spa-only
    confidenceScoring:
      exactMatch: 1.0
      keywordMatch: 0.85
      semanticMatch: 0.7
      contextMatch: 0.6
      threshold: 0.75
  files:
  - path: ui/package.json
    template: package.json.tmpl
  - path: ui/next.config.ts
    template: next.config.ts.tmpl
  - path: ui/tsconfig.json
    template: tsconfig.json.tmpl
  - path: ui/src/app/layout.tsx
    template: layout.tsx.tmpl
  - path: ui/src/app/page.tsx
    template: page.tsx.tmpl
  - path: ui/src/lib/client.ts
    template: client.ts.tmpl
templatesApiVersion: '1'
